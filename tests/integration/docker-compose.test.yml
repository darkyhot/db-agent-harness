services:
  test-pg:
    image: postgres:15-alpine
    container_name: db-agent-test-pg
    environment:
      POSTGRES_USER: test
      POSTGRES_DB: agent_test
      # Локально — trust (без пароля). В CI можно переопределить через .env.
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "55432:5432"
    volumes:
      - test_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d agent_test"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  test_pg_data:
